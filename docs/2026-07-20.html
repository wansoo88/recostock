<html lang="ko">

<meta charset="UTF-8">

<title>recostock 데일리 리포트</title>
<style>
  :root { --bg: #0f1117; --surface: #1a202c; --border: #2d3748; --text: #e2e8f0; --muted: #718096; --green: #48bb78; --red: #fc8181; --amber: #f6ad55; --blue: #63b3ed; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); max-width: 960px; margin: 0 auto; padding: 24px 16px; }
  h1 { color: var(--blue); font-size: 22px; margin-bottom: 4px; }
  .date { color: var(--muted); font-size: 13px; margin-bottom: 16px; }

  /* HERO — 오늘 할 일 (decision-first, 2026-06-11) */
  .hero { background: var(--surface); border-radius: 12px; border-left: 6px solid var(--green); padding: 18px 20px; margin-bottom: 16px; }
  .hero.rebalance { border-left-color: var(--amber); }
  .hero.all_cash  { border-left-color: var(--red); }
  .hero.start     { border-left-color: var(--blue); }
  .hero .headline { font-size: 20px; font-weight: 800; line-height: 1.4; }
  .hero .sub { color: var(--muted); font-size: 12px; margin-top: 8px; }

  .panel { background: var(--surface); border-radius: 10px; padding: 14px 16px; margin-bottom: 16px; }
  .panel .ttl { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
  .panel .ttl .overall { font-size: 12px; }
  .overall.pass { color: var(--green); } .overall.fail { color: var(--red); } .overall.wait { color: var(--amber); }

  .why-list { list-style: none; margin-top: 10px; }
  .why-list li { font-size: 13px; padding: 4px 0 4px 18px; position: relative; color: var(--text); }
  .why-list li::before { content: '•'; position: absolute; left: 4px; color: var(--blue); }

  /* Allocation bar */
  .alloc-bar { display: flex; height: 18px; border-radius: 5px; overflow: hidden; margin: 8px 0 6px; background: #14181f; }
  .alloc-seg { height: 100%; }
  .alloc-legend { display: flex; flex-wrap: wrap; gap: 12px; font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .alloc-legend span { display: inline-flex; align-items: center; gap: 5px; }
  .alloc-legend i { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }

  /* Tables */
  .cand-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .cand-table th { text-align: right; color: var(--muted); font-weight: 600; padding: 6px 8px; border-bottom: 1px solid var(--border); }
  .cand-table th:first-child, .cand-table th:nth-child(2) { text-align: left; }
  .cand-table td { padding: 6px 8px; border-bottom: 1px solid #14181f; text-align: right; font-variant-numeric: tabular-nums; }
  .cand-table td:first-child, .cand-table td:nth-child(2) { text-align: left; }
  .cand-table tr:last-child td { border-bottom: none; }
  .rsi-bar { background: #14181f; border-radius: 3px; height: 5px; margin-top: 3px; width: 46px; }
  .rsi-fill { height: 100%; border-radius: 3px; }

  /* Conviction gates (reference section) */
  .gate-row { display: grid; grid-template-columns: 130px 1fr 90px 30px; gap: 10px; align-items: center; padding: 8px 0; border-bottom: 1px solid #14181f; font-size: 12px; }
  .gate-row:last-child { border-bottom: none; }
  .gate-name { font-weight: 600; color: var(--text); }
  .gate-desc { color: var(--muted); font-size: 11px; }
  .gate-val { text-align: right; font-variant-numeric: tabular-nums; font-weight: 600; }
  .gate-val .thr { font-size: 11px; color: var(--muted); font-weight: 400; }
  .gate-badge { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; }
  .gate-pass { background: rgba(72, 187, 120, 0.18); color: var(--green); }
  .gate-fail { background: rgba(252, 129, 129, 0.18); color: var(--red); }

  /* Conviction signal cards (rare satellite fire) */
  .section-title { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin: 24px 0 10px; }
  .signal-card { background: var(--surface); border-radius: 10px; padding: 16px; margin-bottom: 12px; border-left: 4px solid var(--green); }
  .signal-card.inverse { border-left-color: var(--red); }
  .signal-card.leverage { border-left-color: var(--amber); }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .ticker { font-size: 22px; font-weight: 700; }
  .etf-name { font-size: 13px; color: var(--muted); margin-top: 2px; }
  .dir-badge { font-size: 12px; padding: 3px 10px; border-radius: 5px; font-weight: 600; white-space: nowrap; }
  .long-badge { background: #276749; color: #9ae6b4; }
  .short-badge { background: #742a2a; color: #fc8181; }
  .lev-badge { background: #7b4f12; color: #fbd38d; }
  .levels { display: flex; gap: 24px; margin-bottom: 12px; }
  .level .lbl { font-size: 11px; color: var(--muted); }
  .level .val { font-size: 17px; font-weight: 600; margin-top: 2px; }
  .stats { display: flex; flex-wrap: wrap; gap: 14px; font-size: 13px; color: var(--muted); margin-bottom: 10px; }
  .stats strong { color: var(--text); }
  .factors { margin-top: 8px; }
  .factor-row { display: flex; align-items: center; gap: 8px; margin: 4px 0; font-size: 12px; color: var(--muted); }
  .factor-name { width: 110px; flex-shrink: 0; }
  .bar-track { flex: 1; background: var(--border); border-radius: 4px; height: 7px; }
  .bar-fill { height: 100%; border-radius: 4px; background: var(--blue); }
  .factor-val { width: 48px; text-align: right; color: var(--text); }

  /* Paper stats (legacy reference) */
  .paper-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 14px; }
  .paper-stat { background: var(--surface); border-radius: 8px; padding: 12px 14px; }
  .paper-stat .lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
  .paper-stat .val { font-size: 18px; font-weight: 700; margin-top: 3px; }
  .trade-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .trade-table th { text-align: left; color: var(--muted); font-weight: 600; padding: 6px 8px; border-bottom: 1px solid var(--border); }
  .trade-table td { padding: 5px 8px; border-bottom: 1px solid #1a202c; }
  .trade-table tr:last-child td { border-bottom: none; }
  .pos { color: var(--green); } .neg { color: var(--red); }

  details.ref { margin-top: 24px; border-top: 1px solid var(--border); }
  details.ref > summary { cursor: pointer; color: var(--muted); font-size: 13px; font-weight: 600; padding: 14px 0 10px; list-style-position: inside; }
  details.ref > summary:hover { color: var(--text); }
  details.fineprint { margin-top: 10px; }
  details.fineprint > summary { cursor: pointer; color: var(--muted); font-size: 11px; }
  .fineprint-body { font-size: 11px; color: var(--muted); margin-top: 6px; line-height: 1.6; }

  .disclaimer { font-size: 12px; color: #4a5568; margin-top: 36px; border-top: 1px solid var(--border); padding-top: 16px; line-height: 1.6; }
</style>

            · 손절(200일선) <strong style="color:var(--red)">$${(r.stop||0).toFixed(2)}</strong>
            <span style="color:var(--muted)">(여유 ${r.distStopPct}%)</span></div>
          ${r.pickAsOf ? `<div style="font-size:11px;color:var(--muted)">선정: ${r.pickAsOf} 금요일 종가 · 주 1회 교체</div>` : ''}`;
      } else {
        head = `<div style="font-size:14px;font-weight:600;color:var(--muted);margin:2px 0 4px">▶ 현금 — ${r.note || '후보 없음'}</div>`;
      }
      const rows = (r.ranked || []).slice(0, 5).map(x => {
        const lv = x.leverage > 1 ? `${x.leverage}x` : '';
        const mark = (r.pick === x.ticker) ? '★ ' : '';
        return `<tr style="${r.pick === x.ticker ? 'background:rgba(72,187,120,0.10)' : ''}">
          <td>${mark}<strong>${x.ticker}</strong> <span style="color:var(--muted)">${lv}</span></td>
          <td>${x.score.toFixed(2)}</td>
          <td style="color:${x.above200 ? 'var(--green)' : 'var(--red)'}">${x.above200 ? '위' : '아래'} ${x.distStopPct != null ? (x.distStopPct >= 0 ? '+' : '') + x.distStopPct + '%' : ''}</td>
        </tr>`;
      }).join('');
      return `<div style="flex:1 1 280px;min-width:260px;border:1px solid ${m.accent};border-radius:8px;padding:12px 14px">
        <div style="font-size:12px;color:${m.accent};font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px">
          ${m.label} <span style="color:var(--muted);font-weight:400;text-transform:none">· ${bt.pool || ''}</span></div>
        ${head}
        <table class="cand-table" style="margin-top:8px">
          <thead><tr><th>종목</th><th>점수(${bt.rank || ''})</th><th>200일선</th></tr></thead>
          <tbody>${rows}</tbody></table>
        <div style="font-size:11px;color:var(--muted);margin-top:8px;line-height:1.6">
          검증(비용차감·look-ahead-safe): Full OOS <span class="pos">+${bt.fullRet}%</span>/Shp ${bt.fullSharpe}/MDD ${bt.fullMdd}% ·
          Holdout +${bt.holdRet}%/${bt.holdSharpe}/${bt.holdMdd}% · 연도양수 ${bt.yearsPositive} · 2022 ${bt.bear2022Pct >= 0 ? '+' : ''}${bt.bear2022Pct}% · 게이트 ${bt.gate}<br>
          <span style="color:var(--amber)">⚠️ 주간 +3%는 'TP 목표'지 평균 아님 — 실제 평균 +${bt.wkMeanPct}%/주, +3% 마감 주 ~${bt.wkHit3Pct}%, 최악 주 ${bt.wkWorstPct}%</span>
        </div>
      </div>`;
    };

    document.getElementById('bestpick-panel').innerHTML = `
      <div class="panel" style="border:1px dashed var(--blue);background:transparent">
        <div class="ttl"><span>🎯 베스트픽 long-shot — 단일 종목 주간 픽 (연구·참고)</span>
          <span class="overall wait">라이브 아님 · 수동</span></div>
        <div style="display:flex;gap:14px;flex-wrap:wrap">${have.map(block).join('')}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:10px;line-height:1.6;border-top:1px solid #14181f;padding-top:8px">
          확장 유니버스(6섹터 / 6섹터+3x레버리지)에서 매주 RSI·모멘텀 1위 종목 1개를 집중 보유하는 연구 전략입니다.
          <strong>라이브 블렌드(추세코어 85% + RSI 슬리브 15%)와 별개이며 텔레그램 지시에 포함되지 않습니다</strong> —
          페이퍼 검증 중이라 실자본 구성은 그대로 유지됩니다. 게이트(SPY 200일선 ON + 픽 200일선 위, 아니면 현금)가 낙폭을 한도 내로 묶는 핵심.
          실행은 본인 판단·수동. <code>python scripts/run_best_pick.py --live</code>로 최신 픽 재확인 가능.
        </div>
      </div>`;
  })();

  // ── 6. 참고: conviction 레짐 게이트 + 전략 정보 ────────────────────────────
  (function () {
    const gates = reg.gates || REPORT.gates || [];
    if (!gates.length) return;
    const strat = reg.strategy || REPORT.strategy || {};
    const fmt = (v, f) => {
      if (v === null || typeof v === 'undefined' || !isFinite(v)) return '—';
      if (!f) return v.toFixed(2);
      const m = String(f).match(/([+]?)([.](\d+))?f/);
      const digits = m && m[3] ? parseInt(m[3]) : 2;
      const sign = m && m[1] === '+' && v >= 0 ? '+' : '';
      return sign + v.toFixed(digits);
    };
    const rows = gates.map(g => `<div class="gate-row">
        <div><div class="gate-name">${g.name}</div><div class="gate-desc">${g.desc || ''}</div></div>
        <div></div>
        <div class="gate-val">${fmt(g.value, g.format)}<div class="thr">${g.op} ${fmt(g.threshold, g.format)}</div></div>
        ${g.passed ? '<div class="gate-badge gate-pass">✓</div>' : '<div class="gate-badge gate-fail">✗</div>'}
      </div>`).join('');
    const allPass = gates.every(g => g.passed);
    const passCount = gates.filter(g => g.passed).length;
    const anyName = (reg.candidates || []).some(c => c.passed);
    let overallCls, overallTxt;
    if (!allPass) { overallCls = 'fail'; overallTxt = `✗ 레짐 ${passCount}/${gates.length} — 미발사`; }
    else if (anyName) { overallCls = 'pass'; overallTxt = '✓ 레짐 + 종목 확신도 충족 — 발사'; }
    else { overallCls = 'wait'; overallTxt = `⏳ 레짐 ${gates.length}/${gates.length} 통과 · 종목 확신도(0.65) 미달`; }
    const stratTxt = strat.version
      ? `${strat.version} · ${strat.description || ''} · Holdout WR ${(strat.holdout_wr * 100).toFixed(1)}% n=${strat.holdout_n} (Full ${(strat.full_wr * 100).toFixed(0)}% n=${strat.full_n}) — 주간 K=1 소표본`
      : '';
    document.getElementById('gates-panel').innerHTML = `
      <div class="panel">
        <div class="ttl"><span>conviction 레짐 게이트 (새틀라이트 신호의 1단 필터)</span>
          <span class="overall ${overallCls}">${overallTxt}</span></div>
        ${rows}
        <div style="font-size:11px;color:var(--muted);margin-top:10px;line-height:1.5;border-top:1px solid #14181f;padding-top:8px">
          ${stratTxt ? stratTxt + '<br>' : ''}레짐 통과 후에도 종목별 확신도 ≥ 0.65가 필요해 매우 드물게만 발사됩니다. 발사 시 본문에 ⚡ 참고 신호 카드로 표시.
        </div>
      </div>`;
  })();

  // ── 7. 참고: 구모델 주간 캐리 페이퍼 (legacy) ──────────────────────────────
  (function () {
    const p = REPORT.paper || {};
    const el = document.getElementById('legacy-paper');
    if (!(p.n_trades > 0)) return;
    let html = `
      <div class="panel">
        <div class="ttl"><span>구모델 주간 캐리 페이퍼 — 참고 기록 (현 주력 아님)</span></div>
        <div class="paper-grid">
          <div class="paper-stat"><div class="lbl">누적 수익</div>
            <div class="val ${(p.total_return || 0) >= 0 ? 'pos' : 'neg'}">${((p.total_return || 0) * 100).toFixed(1)}%</div></div>
          <div class="paper-stat"><div class="lbl">Sharpe</div><div class="val">${(p.sharpe || 0).toFixed(2)}</div></div>
          <div class="paper-stat"><div class="lbl">MDD</div><div class="val neg">${((p.mdd || 0) * 100).toFixed(1)}%</div></div>
          <div class="paper-stat"><div class="lbl">적중률</div><div class="val">${((p.winrate || 0) * 100).toFixed(1)}%</div></div>
          <div class="paper-stat"><div class="lbl">손익비</div><div class="val">${(p.payoff || 0).toFixed(2)}</div></div>
          <div class="paper-stat"><div class="lbl">거래</div><div class="val">${p.n_trades || 0}건</div></div>
        </div>`;
    if ((REPORT.paperOpen || []).length) {
      const rows = REPORT.paperOpen.map(t =>
        `<tr><td>${t.open_date}</td><td><strong>${t.ticker}</strong></td>
         <td>$${t.entry_price.toFixed(2)}</td>
         <td>${(t.ema_proba * 100).toFixed(0)}%</td>
         <td>${(t.winrate * 100).toFixed(0)}% / ${t.payoff.toFixed(2)}</td></tr>`).join('');
      html += `<table class="trade-table">
          <tr><th>진입일</th><th>종목</th><th>진입가</th><th>신뢰도</th><th>WR / 손익비</th></tr>${rows}</table>`;
    }
    html += '</div>';
    el.innerHTML = html;
  })();
})();

function renderCard(s) {
  const isInverse = s.dir === 'short';
  const isLev = s.leverage > 1;
  const cardCls = isLev ? 'leverage' : (isInverse ? 'inverse' : '');
  const badgeCls = isLev ? 'lev-badge' : (isInverse ? 'short-badge' : 'long-badge');
  const dirLabel = isLev
    ? `⚡ ${isInverse ? 'INVERSE' : 'LONG'} ${s.leverage}x`
    : (isInverse ? '↓ INVERSE' : '↑ LONG');

  const factorRows = Object.entries(s.factors || {})
    .sort((a, b) => Math.abs(b[1]) - Math.abs(a[1]))
    .slice(0, 5)
    .map(([k, v]) => {
      const pct = Math.min(Math.abs(v) * 100, 100).toFixed(1);
      return `<div class="factor-row">
        <span class="factor-name">${k}</span>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
        <span class="factor-val">${(v * 100).toFixed(1)}%</span>
      </div>`;
    }).join('');

  return `<div class="signal-card ${cardCls}">
    <div class="card-header">
      <div>
        <div class="ticker">${s.ticker}</div>
        <div class="etf-name">${s.name || ''}</div>
      </div>
      <span class="dir-badge ${badgeCls}">${dirLabel}</span>
    </div>
    <div class="levels">
      <div class="level"><div class="lbl">진입</div><div class="val">$${s.entry.toFixed(2)}</div></div>
      <div class="level"><div class="lbl">익절 (TP)</div><div class="val" style="color:var(--green)">$${s.tp.toFixed(2)}</div></div>
      <div class="level"><div class="lbl">손절 (SL)</div><div class="val" style="color:var(--red)">$${s.sl.toFixed(2)}</div></div>
    </div>
    <div class="stats">
      <span>적중률 <strong>${(s.winrate * 100).toFixed(1)}%</strong></span>
      <span>표본 <strong>${s.sampleN}일</strong> (CI: ${(s.ci[0] * 100).toFixed(1)}%–${(s.ci[1] * 100).toFixed(1)}%)</span>
      <span>손익비 <strong>${s.payoff.toFixed(2)}</strong></span>
      <span>기대값 <strong style="color:${s.expectancy >= 0 ? 'var(--green)' : 'var(--red)'}">
        ${(s.expectancy * 100).toFixed(2)}%</strong></span>
      <span>신뢰도 <strong>${(s.confidence * 100).toFixed(0)}%</strong></span>
    </div>
    ${factorRows ? `<div class="factors">${factorRows}</div>` : ''}
  </div>`;
}
</script>
</body>
</html>
