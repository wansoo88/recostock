name: Daily ETF Signal

on:
  # Triggered externally via workflow_dispatch by an Ubuntu-server cron at
  # 22:00 KST (13:00 UTC) Mon-Fri. GitHub's native `schedule` trigger was
  # removed: it is best-effort and routinely delayed 1-3h or skipped, which
  # is unacceptable for a signal that must land before the US open. The
  # external cron POSTs the dispatch API, which queues within seconds.
  # See scripts/trigger_daily_signal.sh.
  workflow_dispatch:

concurrency:
  group: daily-signal
  cancel-in-progress: false     # Never cancel a running pipeline

jobs:
  generate-signal:
    runs-on: ubuntu-latest
    permissions:
      contents: write           # For git push of signal logs + docs/

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run signal pipeline
        env:
          SYSTEM_PHASE: ${{ vars.SYSTEM_PHASE || '0' }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LEVERAGE_EDUCATION_DONE: ${{ secrets.LEVERAGE_EDUCATION_DONE || 'false' }}
          PAGES_URL: ${{ vars.PAGES_URL }}
          # Strategy v1 productized 2026-05-17 from REVIEW §9 experiments.
          # Holdout 2024-2026: WR 58%, Payoff 1.20, Sharpe 1.67, MDD -11%, Total +13%.
          # Set repository variable STRATEGY_MODE=production_v3 to revert.
          STRATEGY_MODE: ${{ vars.STRATEGY_MODE || 'conviction_v1' }}
        run: python scripts/run_daily.py

      - name: Commit signal log and report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/logs/ data/paper/ docs/ data/raw/options/spy_pc_daily.csv
          git diff --staged --quiet || git commit -m "signal: $(date -u +%Y-%m-%d) [skip ci]"
          git push
