name: Daily ETF Signal

on:
  # 13:00 UTC = 22:00 KST (Asia/Seoul). User receives the signal before the
  # US market opens that day (EDT open 13:30 UTC = 22:30 KST → 30 min lead;
  # EST open 14:30 UTC = 23:30 KST → 90 min lead). Korea has no DST so a
  # single cron covers both halves of the year cleanly.
  #
  # By running BEFORE today's US session opens, the pipeline uses the most
  # recent fully-closed US day (yesterday) for inference. data/collector.py
  # already drops today's incomplete bar; at 13:00 UTC today's bar is the
  # current open session anyway, so the filter is a no-op here.
  schedule:
    - cron: "0 13 * * 1-5"    # 13:00 UTC Mon-Fri = 22:00 KST same day
  workflow_dispatch:            # Allow manual trigger for testing

concurrency:
  group: daily-signal
  cancel-in-progress: false     # Never cancel a running pipeline

jobs:
  generate-signal:
    runs-on: ubuntu-latest
    permissions:
      contents: write           # For git push of signal logs + docs/

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run signal pipeline
        env:
          SYSTEM_PHASE: ${{ vars.SYSTEM_PHASE || '0' }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LEVERAGE_EDUCATION_DONE: ${{ secrets.LEVERAGE_EDUCATION_DONE || 'false' }}
          PAGES_URL: ${{ vars.PAGES_URL }}
          # Strategy v1 productized 2026-05-17 from REVIEW §9 experiments.
          # Holdout 2024-2026: WR 58%, Payoff 1.20, Sharpe 1.67, MDD -11%, Total +13%.
          # Set repository variable STRATEGY_MODE=production_v3 to revert.
          STRATEGY_MODE: ${{ vars.STRATEGY_MODE || 'conviction_v1' }}
        run: python scripts/run_daily.py

      - name: Commit signal log and report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/logs/ data/paper/ docs/
          git diff --staged --quiet || git commit -m "signal: $(date -u +%Y-%m-%d) [skip ci]"
          git push
