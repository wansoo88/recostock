name: Nightly Retrain (v3)

on:
  # 14:00 UTC Mon–Fri (native schedule — in practice fires 1-3h late, which is
  # fine: retrain is not time-critical). The daily signal dispatches at 13:00
  # UTC, BEFORE this runs, so tonight's weights apply from the NEXT day's
  # signal. One-day weight lag is accepted by design.
  schedule:
    - cron: "0 14 * * 1-5"
  workflow_dispatch:

concurrency:
  group: retrain
  cancel-in-progress: false

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 30         # normal run ~1 min; a hung fetch must not hold the runner 6h
    permissions:
      contents: write           # commit new weights + retrain_history.csv

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run nightly retrain
        id: train
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/nightly_retrain.py

      - name: Commit new weights
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add models/weights/lgbm_phase3_v3_uniform.pkl \
                  models/weights/lgbm_phase3_v3_uniform_importance.csv \
                  data/logs/retrain_history.csv
          git diff --staged --quiet || git commit -m "weights: nightly retrain $(date -u +%Y-%m-%d) [skip ci]"
          git push
