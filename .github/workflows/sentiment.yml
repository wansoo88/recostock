name: Daily Sentiment Collection

on:
  # 13:00 UTC, Mon–Fri — one hour before nightly retrain so the parquet is
  # fresh when v4 (with sentiment features) eventually plugs it in.
  schedule:
    - cron: "0 13 * * 1-5"
  workflow_dispatch:

concurrency:
  group: sentiment
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write           # commit updated parquet

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install pandas pyarrow

      - name: Collect sentiment
        run: python scripts/collect_sentiment.py

      - name: Commit sentiment parquet
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sentiment/sentiment_daily.parquet
          git diff --staged --quiet || git commit -m "sentiment: $(date -u +%Y-%m-%d) [skip ci]"
          git push
