name: Deploy Intraday Bot (DISABLED)

# DISABLED 2026-05-16: intraday system retired.
# 12 statistical approaches confirmed no alpha exists at retail data scale
# (yfinance 15-min delayed + 5-min bars + 9 ETFs + 0.25% cost). See handoff.md.
# To re-enable: restore the push/paths trigger below and run `systemctl enable
# --now intraday-bot` on the server.
on:
  workflow_dispatch:   # Manual-only — automatic deployments disabled

concurrency:
  group: deploy-intraday
  cancel-in-progress: false

jobs:
  deploy:
    # Runs ON your Ubuntu server (self-hosted runner)
    runs-on: self-hosted

    steps:
      - name: Pull latest code
        run: |
          cd /root/recostock
          git fetch origin main
          git reset --hard origin/main

      - name: Update Python dependencies
        run: |
          /root/recostock/venv/bin/pip install --quiet -r /root/recostock/requirements.txt

      - name: Restart intraday bot
        run: |
          systemctl restart intraday-bot
          sleep 3
          systemctl is-active --quiet intraday-bot && echo "Bot restarted OK" || echo "WARNING: bot failed to start"

      - name: Show recent logs
        run: |
          journalctl -u intraday-bot -n 20 --no-pager
